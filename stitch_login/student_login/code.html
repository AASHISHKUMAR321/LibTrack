<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>LibTrack - Student Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "secondary": "#006e1c",
              "on-primary-container": "#fdfcff",
              "inverse-primary": "#a2c9ff",
              "on-error-container": "#93000a",
              "surface-tint": "#0060a8",
              "on-secondary-container": "#0c7521",
              "inverse-on-surface": "#f1f1f1",
              "tertiary-fixed-dim": "#ffb4ac",
              "surface-container-low": "#f3f3f3",
              "on-secondary-fixed": "#002204",
              "error": "#ba1a1a",
              "primary-fixed-dim": "#a2c9ff",
              "on-tertiary-container": "#fffbff",
              "on-tertiary": "#ffffff",
              "tertiary": "#b7131a",
              "secondary-container": "#98f994",
              "error-container": "#ffdad6",
              "surface-dim": "#dadada",
              "surface-container-high": "#e8e8e8",
              "surface-container": "#eeeeee",
              "secondary-fixed": "#98f994",
              "primary-fixed": "#d3e4ff",
              "secondary-fixed-dim": "#7ddc7a",
              "tertiary-fixed": "#ffdad6",
              "outline-variant": "#c0c7d4",
              "on-primary": "#ffffff",
              "on-background": "#1a1c1c",
              "background": "#f9f9f9",
              "surface": "#f9f9f9",
              "on-tertiary-fixed-variant": "#93000d",
              "on-secondary": "#ffffff",
              "inverse-surface": "#2f3131",
              "on-surface": "#1a1c1c",
              "surface-variant": "#e2e2e2",
              "on-primary-fixed": "#001c38",
              "surface-container-highest": "#e2e2e2",
              "tertiary-container": "#db322f",
              "on-error": "#ffffff",
              "outline": "#707783",
              "surface-container-lowest": "#ffffff",
              "on-tertiary-fixed": "#410002",
              "on-primary-fixed-variant": "#004881",
              "surface-bright": "#f9f9f9",
              "primary-container": "#0077ce",
              "on-surface-variant": "#404752",
              "primary": "#005ea4",
              "on-secondary-fixed-variant": "#005313"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-glass {
            background-color: rgba(249, 249, 249, 0.8);
            backdrop-filter: blur(20px);
        }
        .primary-gradient {
            background: linear-gradient(135deg, #005ea4 0%, #0077ce 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface selection:bg-primary-fixed">
<main class="min-h-screen flex flex-col items-center justify-center p-6 sm:p-12 relative overflow-hidden">
<!-- Background decorative elements -->
<div class="absolute top-[-10%] right-[-10%] w-[400px] h-[400px] bg-primary/5 rounded-full blur-3xl"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[300px] h-[300px] bg-secondary/5 rounded-full blur-3xl"></div>
<div class="w-full max-w-md z-10">
<!-- Branding Header -->
<div class="flex flex-col items-center mb-12">
<div class="w-14 h-14 bg-surface-container-lowest rounded-xl shadow-[0px_4px_20px_rgba(26,28,28,0.06)] flex items-center justify-center mb-6 border border-outline-variant/15">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="local_library">local_library</span>
</div>
<h1 class="font-headline font-extrabold text-3xl tracking-tighter text-primary mb-1">LibTrack</h1>
<p class="font-label text-xs uppercase tracking-[0.15em] text-on-surface-variant font-semibold">Student Portal</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-xl p-8 shadow-[0px_4px_20px_rgba(26,28,28,0.06)] border border-outline-variant/10">
<div class="mb-8">
<h2 class="font-headline font-bold text-xl text-on-surface mb-2">Welcome Back</h2>
<p class="text-on-surface-variant text-sm">Enter your credentials to access the digital library shelf.</p>
</div>
<form class="space-y-6">
<!-- Input Group -->
<div class="space-y-2">
<label class="font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider ml-1" for="student_id">Student ID or Phone Number</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline transition-colors group-focus-within:text-primary" data-icon="badge">badge</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-high border-none rounded-lg font-body text-sm focus:ring-0 focus:bg-surface-container-lowest focus:border-b-2 focus:border-primary transition-all placeholder:text-outline" id="student_id" name="student_id" placeholder="STU-2024-001 or +1..." type="text"/>
</div>
</div>
<!-- CTA Section -->
<div class="pt-2">
<button class="w-full primary-gradient text-on-primary font-headline font-bold py-4 rounded-lg shadow-sm hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2 group" type="submit">
<span>Sign In</span>
<span class="material-symbols-outlined text-lg transition-transform group-hover:translate-x-1" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</form>
<!-- Footer Links -->
<div class="mt-8 pt-6 flex flex-col items-center gap-4">
<button class="text-primary font-body text-sm font-semibold hover:underline">Forgot your access code?</button>
<div class="flex items-center gap-2 w-full">
<div class="h-[1px] flex-grow bg-surface-container"></div>
<span class="text-outline text-[10px] uppercase tracking-widest font-bold">New Student?</span>
<div class="h-[1px] flex-grow bg-surface-container"></div>
</div>
<button class="text-on-surface-variant font-body text-sm font-medium hover:text-primary transition-colors">Request Registration Access</button>
</div>
</div>
<!-- Trust Indicator -->
<div class="mt-12 text-center">
<p class="text-[11px] text-outline font-label uppercase tracking-widest flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-sm" data-icon="verified_user">verified_user</span>
                    Secure Academic Gateway
                </p>
</div>
</div>
</main>
<!-- Visual Polish: Content Canvas Elements -->
<div class="fixed top-0 left-0 w-full h-1 bg-surface-container">
<div class="h-full bg-primary w-1/3"></div>
</div>
</body></html>
